<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandip Food Centre – Fast Food Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & ROOT ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
:root{
  --cream:#FDF8F0;
  --warm:#FAF3E0;
  --brown:#3D1F00;
  --brown2:#6B3A1F;
  --amber:#D47C0F;
  --amber2:#F5A623;
  --green:#2D6A4F;
  --green2:#40916C;
  --red:#C0392B;
  --white:#FFFFFF;
  --shadow:rgba(61,31,0,0.12);
  --shadow2:rgba(61,31,0,0.22);
  --border:rgba(61,31,0,0.1);
  --text:#2C1A0E;
  --muted:#8B6B4A;
  --radius:16px;
  --radius-sm:10px;
}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--cream);
  color:var(--text);
  overflow-x:hidden;
  min-height:100vh;
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--warm)}
::-webkit-scrollbar-thumb{background:var(--amber);border-radius:10px}

/* ── HEADER / NAV ── */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(253,248,240,0.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.logo{
  display:flex;align-items:center;gap:10px;
  text-decoration:none;
}
.logo-icon{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,var(--amber),var(--amber2));
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;
  box-shadow:0 4px 12px rgba(212,124,15,0.35);
}
.logo-text{
  font-family:'Playfair Display',serif;
  font-size:1.15rem;font-weight:900;
  color:var(--brown);line-height:1.1;
}
.logo-text small{
  display:block;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.62rem;font-weight:500;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);
}
.nav-right{display:flex;align-items:center;gap:10px}
.wa-nav{
  display:flex;align-items:center;gap:6px;
  background:#25D366;color:#fff;
  border-radius:50px;padding:8px 14px;
  font-size:0.75rem;font-weight:700;letter-spacing:0.5px;
  text-decoration:none;transition:all 0.2s;
  white-space:nowrap;
}
.wa-nav:hover{background:#1da851;transform:scale(1.03)}
.cart-fab{
  position:relative;background:var(--brown);color:#fff;
  border:none;border-radius:50px;padding:9px 18px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;
  font-weight:700;cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;gap:7px;
}
.cart-fab:hover{background:var(--brown2);transform:scale(1.04)}
.cart-badge{
  background:var(--amber2);color:var(--brown);
  border-radius:50%;width:20px;height:20px;
  font-size:0.68rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.25s;
}
.cart-badge.pop{animation:pop 0.3s ease}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.45)}}

/* ── HERO ── */
.hero{
  background:linear-gradient(145deg,var(--brown) 0%,var(--brown2) 60%,#8B4513 100%);
  color:#fff;padding:56px 20px 48px;text-align:center;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero-inner{position:relative;z-index:1;max-width:600px;margin:0 auto}
.hero-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);
  border-radius:50px;padding:5px 14px;
  font-size:0.72rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--amber2);margin-bottom:20px;
  animation:fadeUp 0.6s ease both;
}
.hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.4rem,8vw,4rem);font-weight:900;
  line-height:1.05;margin-bottom:12px;
  animation:fadeUp 0.6s 0.1s ease both;
}
.hero h1 span{color:var(--amber2)}
.hero-tag{
  font-size:0.95rem;color:rgba(255,255,255,0.72);
  margin-bottom:24px;font-weight:400;
  animation:fadeUp 0.6s 0.2s ease both;
}
.hero-loc{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.1);border-radius:50px;
  padding:8px 18px;font-size:0.78rem;color:rgba(255,255,255,0.8);
  margin-bottom:32px;
  animation:fadeUp 0.6s 0.25s ease both;
}
.hero-actions{
  display:flex;justify-content:center;gap:12px;flex-wrap:wrap;
  animation:fadeUp 0.6s 0.3s ease both;
}
.btn-hero-primary{
  background:var(--amber2);color:var(--brown);
  border:none;border-radius:50px;padding:14px 30px;
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.9rem;
  cursor:pointer;transition:all 0.22s;text-decoration:none;
  display:inline-flex;align-items:center;gap:8px;
}
.btn-hero-primary:hover{background:#FFB638;transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,166,35,0.45)}
.btn-hero-outline{
  background:transparent;color:#fff;
  border:1.5px solid rgba(255,255,255,0.35);border-radius:50px;
  padding:13px 30px;font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:600;font-size:0.9rem;cursor:pointer;
  transition:all 0.22s;text-decoration:none;
  display:inline-flex;align-items:center;gap:8px;
}
.btn-hero-outline:hover{border-color:#fff;background:rgba(255,255,255,0.1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── PILLS STRIP ── */
.strip{
  background:var(--green);color:#fff;
  padding:12px 20px;text-align:center;
  font-size:0.78rem;font-weight:500;letter-spacing:0.3px;
  display:flex;justify-content:center;align-items:center;gap:24px;flex-wrap:wrap;
}
.strip-item{display:flex;align-items:center;gap:6px}

/* ── SECTION ── */
.section{padding:48px 20px}
.section-head{text-align:center;margin-bottom:36px}
.section-eyebrow{
  font-size:0.72rem;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:var(--amber);margin-bottom:8px;
}
.section-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,5vw,3rem);font-weight:900;
  color:var(--brown);line-height:1.1;
}
.section-title span{color:var(--amber)}

/* ── CATEGORY FILTER ── */
.cat-scroll{
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding-bottom:4px;
  margin-bottom:28px;
}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-row{
  display:flex;gap:10px;width:max-content;
  padding:0 4px;
}
.cat-btn{
  padding:9px 20px;border-radius:50px;white-space:nowrap;
  border:1.5px solid var(--border);background:var(--white);
  color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.78rem;font-weight:600;letter-spacing:0.5px;
  cursor:pointer;transition:all 0.18s;
}
.cat-btn:hover{border-color:var(--amber);color:var(--brown)}
.cat-btn.active{
  background:var(--brown);border-color:var(--brown);
  color:#fff;box-shadow:0 4px 12px var(--shadow2);
}

/* ── FOOD GRID ── */
.food-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
}
@media(min-width:480px){.food-grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}}
@media(min-width:768px){.food-grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}}

.food-card{
  background:var(--white);border-radius:var(--radius);
  border:1px solid var(--border);
  padding:18px 16px;
  display:flex;flex-direction:column;gap:12px;
  transition:all 0.22s;
  animation:fadeUp 0.45s ease both;
  box-shadow:0 2px 8px var(--shadow);
}
.food-card:hover{transform:translateY(-4px);box-shadow:0 10px 28px var(--shadow2);border-color:rgba(212,124,15,0.25)}
.food-emoji{
  width:50px;height:50px;border-radius:12px;
  background:linear-gradient(135deg,var(--warm),#FDE8C8);
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;
}
.food-name{
  font-weight:700;font-size:0.92rem;
  color:var(--brown);line-height:1.3;flex:1;
}
.food-sub{
  font-size:0.68rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;
  margin-top:-6px;
}
.add-btn{
  background:var(--brown);color:#fff;border:none;
  border-radius:50px;padding:9px 16px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:0.76rem;font-weight:700;letter-spacing:0.5px;
  cursor:pointer;transition:all 0.18s;align-self:flex-start;
  display:flex;align-items:center;gap:6px;
}
.add-btn:hover{background:var(--amber);transform:scale(1.05)}
.add-btn.in-cart{background:var(--green);pointer-events:none}

/* ── CONTACT SECTION ── */
.contact-section{
  background:var(--brown);color:#fff;
  padding:48px 20px;text-align:center;
}
.contact-section .section-title{color:#fff}
.contact-section .section-title span{color:var(--amber2)}
.contact-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:20px;
  max-width:500px;margin:28px auto 0;
}
@media(max-width:400px){.contact-grid{grid-template-columns:1fr}}
.contact-card{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--radius);padding:20px 16px;
}
.contact-card .cc-icon{font-size:1.6rem;margin-bottom:8px}
.contact-card .cc-label{font-size:0.65rem;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.contact-card .cc-val{font-size:0.9rem;font-weight:600}
.wa-big{
  display:inline-flex;align-items:center;gap:10px;
  background:#25D366;color:#fff;
  border-radius:50px;padding:15px 32px;
  font-weight:700;font-size:1rem;text-decoration:none;
  margin-top:28px;transition:all 0.2s;
}
.wa-big:hover{background:#1da851;transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,211,102,0.4)}

/* ── FOOTER ── */
footer{
  background:var(--brown2);color:rgba(255,255,255,0.55);
  padding:24px 20px;text-align:center;font-size:0.78rem;
  border-top:1px solid rgba(255,255,255,0.08);
}
footer strong{color:rgba(255,255,255,0.85)}

/* ── FLOATING CART ── */
.float-cart{
  position:fixed;bottom:24px;right:20px;z-index:150;
  background:var(--brown);color:#fff;
  border:none;border-radius:50%;
  width:58px;height:58px;
  box-shadow:0 6px 24px var(--shadow2);
  cursor:pointer;font-size:1.4rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.float-cart:hover{background:var(--brown2);transform:scale(1.1)}
.float-cart .fc-badge{
  position:absolute;top:-3px;right:-3px;
  background:var(--amber2);color:var(--brown);
  border-radius:50%;width:22px;height:22px;
  font-size:0.7rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  font-family:'Plus Jakarta Sans',sans-serif;
}

/* ── CART DRAWER ── */
.overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.overlay.show{opacity:1;pointer-events:all}
.drawer{
  position:fixed;top:0;right:0;bottom:0;z-index:301;
  width:min(460px,100%);
  background:var(--cream);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  box-shadow:-8px 0 32px rgba(0,0,0,0.2);
}
.overlay.show .drawer{transform:translateX(0)}
.drawer-head{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;background:var(--white);
}
.drawer-head h2{
  font-family:'Playfair Display',serif;font-size:1.5rem;
  font-weight:900;color:var(--brown);
}
.drawer-close{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.18s;
}
.drawer-close:hover{border-color:var(--red);color:var(--red)}
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.empty-cart{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:200px;gap:12px;color:var(--muted);text-align:center;
}
.empty-cart .ec-icon{font-size:3.5rem}
.empty-cart p{font-size:0.88rem}
.cart-item-row{
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;
  display:flex;align-items:center;gap:12px;
}
.ci-emoji{font-size:1.5rem;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-weight:700;font-size:0.88rem;color:var(--brown);margin-bottom:2px;word-break:break-word}
.ci-cat{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px}
.ci-qty{display:flex;align-items:center;gap:8px;flex-shrink:0}
.qty-btn{
  width:28px;height:28px;border-radius:50%;
  border:1.5px solid var(--border);background:var(--white);
  color:var(--brown);cursor:pointer;font-size:0.95rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;font-weight:700;
}
.qty-btn:hover{border-color:var(--amber);background:var(--warm)}
.qty-num{font-weight:700;font-size:0.9rem;min-width:18px;text-align:center}
.del-btn{
  background:transparent;border:none;cursor:pointer;
  color:var(--muted);font-size:1rem;padding:4px;
  transition:color 0.15s;flex-shrink:0;
}
.del-btn:hover{color:var(--red)}

/* ── DRAWER FOOTER ── */
.drawer-foot{
  border-top:1px solid var(--border);
  padding:16px 20px 20px;flex-shrink:0;
  background:var(--white);
}
.total-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;font-family:'Playfair Display',serif;
  font-size:1.1rem;font-weight:700;color:var(--brown);
}
.total-val{color:var(--green);font-size:1.2rem}

/* ── CHECKOUT ACCORDION ── */
.checkout-toggle{
  width:100%;padding:12px 16px;
  background:var(--warm);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;font-weight:600;
  color:var(--brown);cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  transition:border-color 0.18s;margin-bottom:14px;
}
.checkout-toggle:hover{border-color:var(--amber)}
.checkout-toggle .arrow{transition:transform 0.25s}
.checkout-toggle.open .arrow{transform:rotate(180deg)}
.checkout-body{display:none;flex-direction:column;gap:10px;margin-bottom:14px}
.checkout-body.visible{display:flex}
.form-field{
  width:100%;padding:11px 14px;
  background:var(--white);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;
  color:var(--text);outline:none;transition:border-color 0.18s;
  resize:none;
}
.form-field::placeholder{color:var(--muted)}
.form-field:focus{border-color:var(--amber)}
.form-field.err{border-color:var(--red)}
.method-tabs{display:flex;gap:8px;margin-bottom:14px}
.method-tab{
  flex:1;padding:10px 6px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--white);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:0.78rem;font-weight:600;
  cursor:pointer;transition:all 0.18s;color:var(--muted);
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.method-tab.sel{border-color:var(--brown);background:var(--brown);color:#fff}
.order-wa{
  width:100%;padding:14px;
  background:#25D366;color:#fff;border:none;
  border-radius:var(--radius-sm);
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.9rem;
  cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.order-wa:hover{background:#1da851;transform:translateY(-1px);box-shadow:0 6px 16px rgba(37,211,102,0.35)}
.order-wa:disabled{background:#ccc;color:#888;cursor:not-allowed;transform:none;box-shadow:none}
.order-email{
  width:100%;padding:14px;
  background:var(--amber);color:var(--brown);border:none;
  border-radius:var(--radius-sm);
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.9rem;
  cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.order-email:hover{background:var(--amber2);transform:translateY(-1px);box-shadow:0 6px 16px rgba(212,124,15,0.35)}
.order-email:disabled{background:#ccc;color:#888;cursor:not-allowed;transform:none;box-shadow:none}
.order-btns{display:flex;flex-direction:column;gap:8px}

/* ── SUCCESS TOAST ── */
.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
  z-index:500;
  background:var(--green);color:#fff;
  border-radius:var(--radius);padding:16px 24px;
  font-weight:600;font-size:0.9rem;text-align:center;
  box-shadow:0 8px 28px rgba(0,0,0,0.2);
  opacity:0;transition:all 0.35s;
  min-width:280px;max-width:90vw;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADING ── */
.spinner{
  display:none;width:18px;height:18px;
  border:2px solid rgba(255,255,255,0.4);
  border-top-color:#fff;border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── HIDDEN FORMSPREE FORM ── */
#formspree-form{display:none}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .hero{padding:44px 16px 40px}
  .section{padding:36px 16px}
  .wa-nav span{display:none}
  header{padding:12px 14px}
}
</style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
  <a href="#" class="logo">
    <div class="logo-icon">🍽️</div>
    <div class="logo-text">
      Sandip Food Centre
      <small>Fast Food Restaurant</small>
    </div>
  </a>
